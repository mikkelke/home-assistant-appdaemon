# /conf/apps/lights/guest_bathroom_lights.yaml

guest_bathroom_lights:
  module: guest_bathroom_lights
  class: GuestBathroomLights
  log: guest_bathroom_lights_log

  # --- Light Entity ---
  light_entity: "light.guest_bathroom_lights"

  # --- Presence Sensors ---
  raw_pir_sensor: "binary_sensor.guest_bathroom_pir_presence"
  # Global mechanism: manual override toggle — ON pauses ALL automatic actions for this room
  manual_override_boolean: "input_boolean.guest_bathroom_lights_manual"

  # --- Door Sensor ---
  door_sensor: "binary_sensor.guest_bathroom_door_contact"

  # --- Switch Control ---
  # Zigbee2MQTT PTM 215Z switch event entity
  switch_event_entity: "event.guest_bathroom_switch_action"

  # --- Adaptive Lighting ---
  # Adaptive Lighting switch entity for triggering recalculation
  adaptive_lighting_switch: "switch.adaptive_lighting_guest_bathroom"

  # Logging configuration
  verbosity_level: "normal"  # "quiet", "normal", "debug"

