# /conf/apps/lights/presence_model.yaml
# Presence middle layer, SHADOW mode: publishes binary_sensor.presence_<room>
# mirroring the existing binary_sensor.<room>_pir_presence composites, enriched
# with reason / source introspection / kitchen music-ghost flag. NOTHING
# consumes these yet - compare for a week, then repoint consumers room by room
# (plan: ~/.claude/plans/middle-layer-2026-07-12.md, Phase 3).

PresenceModel:
  module: presence_model
  class: PresenceModel
  rooms:
    - bathroom
    - bedroom
    - guest_bathroom
    - claudias_room
    - living_room
    - dining_room
    - hallway
    - kitchen
    - kristines_room
  # Trust rules - presence is flagged `suspect` while the interference source
  # is active and only marker-matching (mmWave) members are firing.
  distrust_rules:
    kitchen:
      when_entity: media_player.kitchen_2
      when_state: playing
      marker: presence_presence
      label: kitchen speaker playing (cone micro-motion)
    bedroom:
      when_entity: sensor.air_conditioner_real_time_power
      when_above: 50
      marker: bedroom_presence
      label: AC running (airflow/curtain ghost, 2026-07-12)
    bathroom:
      when_entity: sensor.air_conditioner_real_time_power
      when_above: 50
      marker: bathroom_presence
      label: AC condenser in bathroom
