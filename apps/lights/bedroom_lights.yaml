# /conf/apps/lights/bedroom_lights.yaml
#
# Effective occupancy (vacant vs occupied gate only):
#   FP300 mmWave presence OR bathroom PIR when bathroom door is open OR an active bed-light
#   session (see bedroom_lights.py class docstring).
# Dark/bright from room_state_text_entity (darkness_calculator).

bedroom_lights:
  module: bedroom_lights
  class: BedroomLights
  log: bedroom_lights_log

  bed_lights: "light.bedroom_bed_lights"
  ceiling_lights: "light.bedroom_ceiling_lights"
  # Reliable ON-edge only signal to START a bed-light session; their OFF edge is ignored.
  withings_in_bed_entities:
    - binary_sensor.left_bedside
    - binary_sensor.right_bedside_in_bed

  switch_device_id: "951e07324391856c37850361629523d7"
  remote_device_id: "fde0ce72582c723f4d8b729b522fc2fa"

  raw_pir_sensor: "binary_sensor.bedroom_pir_presence"
  raw_bathroom_pir_sensor: "binary_sensor.bathroom_pir_presence"
  bathroom_door_sensor: "binary_sensor.bathroom_door_contact"

  mikkel_sleep_entity: "input_boolean.mikkel_sleep_mode"
  # Global mechanism: manual override toggle — ON pauses ALL automatic actions for this room
  manual_override_boolean: "input_boolean.bedroom_lights_manual"
  bedroom_blind_entity: "cover.bedroom_blind"
  # A "closed" blind can report 98-99 instead of a clean 100 (battery/motor slack); treat
  # >= this as closed so auto-on stays blocked. Matches wakeup_bedroom's closed_threshold.
  blind_closed_threshold: 95

  # Bed-light session latch (bed vs ceiling): reliable local FP300 mmWave presence, single
  # source of truth mirrored to bed_session_entity and read by wakeup_bedroom for the wake
  # ramp hand-off. See bedroom_lights.py class docstring.
  bed_session_entity: input_boolean.bedroom_bed_session
  bedroom_presence_sensor: binary_sensor.bedroom_presence_presence
  session_exit_debounce_sec: 90

  verbosity_level: "normal"
  room_state_text_entity: "sensor.room_state_bedroom_bathroom"
  darkness_confirmed_sensor_entity: "sensor.darkness_bedroom_bathroom"
