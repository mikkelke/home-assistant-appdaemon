# /conf/apps/lights/claudias_room_lights.yaml

# Manual control (physical wall switch + direct app/dashboard control of the light
# entities), plus one safety-off: if Claudia leaves the apartment with a light still
# on, it is turned off. The old automatic lighting (PIR occupancy + darkness_calculator
# room_state push) was disabled 2026-07-20 (user request); see the
# claudias_room_lights.py docstring to restore it.
claudias_room_lights:
  module: claudias_room_lights
  class: ClaudiasRoomLights
  log: claudias_room_lights_log

  # Lights toggled by the wall switch: press_1 = ceiling, press_3 = floor
  ceiling_light:       "light.claudias_room_ceiling_lights"
  floor_light:         "light.claudias_room_floor_light"

  # Safety-off: turn the room's lights off if this person leaves the apartment,
  # but only when the room is empty (skip if the PIR still reads occupied)
  presence_entity:     "person.claudia"
  pir_sensor:          "binary_sensor.claudias_room_pir_presence"

  verbosity_level: "normal"  # "quiet", "normal", "debug"
