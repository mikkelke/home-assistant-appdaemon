# /conf/apps/security/entry_truth.yaml
# Entry arbitration middle layer -> binary_sensor.apartment_entry_secure. Sits ABOVE
# LockHealth's arbitrated sensor.apartment_lock (locks -> LockHealth -> lock_source ->
# EntryTruth (+door) -> entry_secure); falls back to the raw BLE lock when lock_source
# itself is down, so a stopped/reloading LockHealth doesn't take entry_secure down too.

EntryTruth:
  module: entry_truth
  class: EntryTruth
  lock_source: sensor.apartment_lock
  lock_fallback: lock.yale_bt
  door_open_entity: binary_sensor.apartment_door_open
