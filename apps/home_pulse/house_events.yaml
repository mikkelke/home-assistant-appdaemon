# HouseEvents - apartment-level "why did the house just do that" feed (sensor.house_events)
# for the dashboard's Home activity card. Two inputs: appliance milestone observation (below)
# and `house_events_report` events fired by the automation apps themselves (cause -> effect).
# Observer only: controls nothing. See house_events.py header for shape and persistence caveats.
HouseEvents:
  module: house_events
  class: HouseEvents
  feed_entity: sensor.house_events
  appliances:
    sensor.washer_state: Washer
    sensor.dishwasher_state: Dishwasher
    sensor.dryer_state: Dryer
