WakeupBedroom:
  module: wakeup_bedroom
  class: WakeupRoutine
  log: wakeup_bedroom_log
  log_level: INFO

  alarm_time_entity: input_datetime.wakeup_bedroom
  alarm_enabled_entity: input_boolean.wakeup_bedroom

  presence_persons:
    - person.mikkel

  media_master: media_player.bedroom
  media_join:
    - media_player.bathroom
  media_content_id: "https://drliveradio2.akamaized.net/hls/live/2118698/p3/playlist-320000.m3u8"
  media_content_type: "music"
  media_fallback: "https://drliveradio2.akamaized.net/hls/live/2118698/p3/playlist-96000.m3u8"  # low-bitrate variant; old icy endpoint is dead
  # HLS needs 3-8 s to report "playing"; the old 2 s check caused ~15 % false failovers
  # (Mar-Jul 2026). First verify late, then one recheck per attempt before switching stream.
  media_verify_delay_sec: 12
  media_verify_recheck_sec: 5
  media_still_playing_check_sec: 45

  volume_entities:
    - media_player.bedroom
    - media_player.bathroom
  volume_start: 0.06
  volume_target: 0.18
  volume_step: 0.03
  volume_interval_sec: 60

  covers:
    bedroom: cover.bedroom_blind
    bathroom: cover.bathroom_blind
  closed_is_100: true
  # A "closed" blind can report 98-99 (battery/motor slack); treat >= this as closed so the
  # morning open still fires. Matches bedroom_blind_control's closed_threshold.
  closed_threshold: 95
  bedroom_cover_target: 38
  bathroom_cover_target: 40
  # Heat-wave override (user, 2026-07-15): input_boolean.heat_wave_mode is now a manual
  # FORCE-ON over the automatic heat-block decision below (sun on the window / hot forecast /
  # already warm outside) - flip it on to force bedroom_cover_target_heat_wave regardless of
  # those signals. Auto-cleared after use (heat_wave_manual_auto_clear) so it never lingers.
  heat_wave_entity: input_boolean.heat_wave_mode
  bedroom_cover_target_heat_wave: 72
  # Automatic heat-block (see wakeup_bedroom.py _decide_bedroom_wake_target): at wake time,
  # close the bedroom blind to bedroom_cover_target_heat_wave instead of bedroom_cover_target
  # when direct morning sun is hitting the window, today's forecast high is hot, or it's
  # already warm outside right now.
  heat_auto_enable: true
  heat_wave_manual_auto_clear: true
  sun_entity: sun.sun
  solar_radiation_entity: sensor.gw2000a_solar_radiation
  window_azimuth: 70
  az_tolerance: 55
  min_elevation: 3
  radiation_threshold: 250
  outdoor_temp_entity: sensor.gw2000a_outdoor_temperature
  live_outdoor_hot_c: 22.0
  weather_entity: weather.forecast_home
  forecast_high_threshold_c: 25.0
  forecast_refresh_min: 30
  forecast_max_age_min: 180
  # Dynamic wait after blind reaches target before deciding wake bed-light ramp.
  # Uses outdoor lux clue so dark mornings stay responsive while bright mornings avoid flash-on.
  outdoor_lux_entity: sensor.gw2000a_solar_lux
  post_blind_outdoor_mid_lux: 3000
  post_blind_outdoor_bright_lux: 5000
  post_blind_settle_dark_sec: 10
  post_blind_settle_mid_sec: 25
  post_blind_settle_bright_sec: 60

  # Same entity + semantics as bedroom_lights (room_state_darkness.is_dark_for_lights)
  bedroom_state_entity: sensor.room_state_bedroom_bathroom
  light_entity: light.bedroom_bed_lights

  # Optional presence for media unmute behavior when room is empty
  # Use AOD occupancy output (more reliable than raw presence)
  # FP300 occupancy (area_occupancy entity was removed from HA)
  bedroom_presence_entity: binary_sensor.bedroom_presence_presence

  adaptive_main_switch: switch.adaptive_lighting_bedroom
  adaptive_brightness_switch: switch.adaptive_lighting_adapt_brightness_bedroom_bed_lights
  # Sleep booleans: AppDaemon apps rutines/mikkel_sleep_mode.yaml
  mikkel_sleep_entity: input_boolean.mikkel_sleep_mode

  ramp_start_pct: 1
  ramp_step_pct: 6
  ramp_interval_sec: 60
  ramp_max_pct: 90

  # Yield the wake light ramp to ceiling logic once bedroom_lights' bed-light session ends
  # (input_boolean.bedroom_bed_session, driven by the reliable local FP300 mmWave presence) -
  # prevents the bed lights ramping alongside the room's normal lighting and ending up with
  # both on. See wakeup_bedroom.py _bed_session_active / _on_bed_session_change.
  bed_session_entity: input_boolean.bedroom_bed_session


