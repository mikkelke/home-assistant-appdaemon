# dryer_programmes.yaml — Miele TCB150 WP (Heat Pump Dryer)
#
# Full valid programme matrix (programme × dryness × Skåne+). Internal flat keys for
# profile lookup, ETA, and learning. HA GUI uses split selectors; app derives this key.
#
# Fields per programme:
#   label:           Human-readable name for UI
#   duration_min:    Expected cycle time (only where manual publishes; Varm luft = selected min)
#   max_energy_kwh:  Rated energy (only where manual publishes)
#   is_real:         False for air/refresh only (e.g. finish_uld)
#
# Shortest real programme: Skjorter 60 min / Strygelet 65–66 min (fill_window_minutes, min_cycle_minutes)

