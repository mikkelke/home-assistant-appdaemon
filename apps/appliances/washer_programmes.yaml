# washer_programmes.yaml — Miele WEA 035 WCS Active
# Programme truth: nominal duration, valid min/max, energy bands, option support.
# UI matrix: allowed_temperatures, allowed_spin_speeds, default_*, available_options (canonical values only).
# Merged with Python _DEFAULT_PROFILES; YAML overrides/extends only.
# Manual: page 62 (consumption table); Programme overview pp. 26–28.
#
# Cold-water: machine is cold-water fed; any selected temp other than Cold = machine heats.
# Programmes that can run cold (manual): Bomuld 90→cold, Strygelet 60→cold, Uld 40→cold,
#   Finvask 40→cold, Ekspres 20 40→cold, Mørkt/Denim 60→cold, Outdoor 40→cold.
#
# ECO 40-60: Manual page 62 at 7 kg = 3:19 (199 min). Full load typical — use 199 so UI matches
# machine (e.g. start 07:49, done ~11:00, machine shows ~1h42 left). Range 159–199 min.
# Bomuld 60: 149 min. Strygelet ~119 min. Uld: 39 min. Ekspres: 20 min.
#
# Canonical UI values: temperatures "Cold", "20°C" … "90°C"; spin "1400 rpm" … "No spin".
# Manual max spin by programme: 1400 = ECO, Bomuld, Pumpe/Centrifugering, Kun skyl/stivelse;
#   1200 = Strygelet, Uld, Ekspres, Mørkt/Denim, Imprægnering; 900 = Finvask, Outdoor.
# available_options = UI only (which toggles to show); supports_* = backend/validation.

programme_display_order:
  - ekspres
  - uld
  - bomuld
  - finvask
  - strygelet
  - eco
  - morkt_denim
  - outdoor
  - impraegnering
  - pumpe_centrifugering
  - kun_skyl_stivelse

programmes:
  uld:
    label: "Uld"
    allowed_temperatures: ["Cold", "20°C", "30°C", "40°C"]
    allowed_spin_speeds: ["1200 rpm", "900 rpm", "700 rpm", "No spin"]   # Manual: max 1200
    default_temperature: "30°C"
    default_spin: "1200 rpm"
    available_options: []
    duration_min: 39
    max_dur_min: 55
    nominal_duration_min: 39
    min_valid_duration_min: 25
    max_valid_duration_min: 55
    max_energy_kwh: 0.28
    nominal_energy_kwh: 0.28
    min_valid_energy_kwh: 0.1
    max_valid_energy_kwh: 0.28
    supports_anti_crease: false   # Manual: Uld is the exception (no anti-crease)
    supports_water_plus: false
    supports_soak: false
    supports_prewash: false
    supports_short: false

  eco:
