# Smart Cooling v2 -- closed-loop pre-cool for the bedroom AC.
# Knobs you ever touch: input_boolean.smart_cooling (Arm) + input_boolean.smart_cooling_ac_removed
# (click right before taking the unit out - whatever the clock says). No bedtime knob (removed
# 2026-07-15): the price-optimizer shops slots up to midnight; from 23:00 the horizon never
# shrinks below 1h, and past midnight it rolls a 1h window until the AC-removed press (raw
# midnight cap shut the AC off at 23:52 mid-deficit, 2026-07-15). Past midnight it also chases
# the hardware floor rather than just the physics-minimum target (user 2026-07-17: cheap power
# + sealing imminent = no reason to stop early), bounded by tonight's real saturation.
# Optional default: input_number.smart_cooling_night_ceiling (23C). Depth is calculated, not set.
# dry_run: true -> it runs, learns and publishes the plan, but every AC command is a no-op.

SmartCooling:
  module: smart_cooling
  class: SmartCooling

  # entities (these match the code defaults; listed for clarity)
  climate_entity: climate.air_conditioner_thermostat
  floor_sensor: sensor.bedroom_floor_thermometer_temperature      # mass battery + control + sleeping-zone floor
  mid_sensor: sensor.bedroom_temperature                          # mid wall by kitchen door = top of sleeping zone
  ceiling_sensor: sensor.bedroom_presence_temperature             # AC blows cold up here -> delivery check
  ac_sensor: sensor.air_conditioner_indoor_temperature            # at the unit -> is cold flowing
  bathroom_temp_sensor: sensor.bathroom_temperature               # condenser dump / back-leak guard
  kitchen_sensor: sensor.kitchen_temperature                      # neighbour wall (headwind)
  outdoor_temp_sensor: sensor.gw2000a_outdoor_temperature         # minor
  vent_window_sensor: binary_sensor.bathroom_window_contact
  price_entity: sensor.energi_data_service
  enable_entity: input_boolean.smart_cooling
  night_ceiling_entity: input_number.smart_cooling_night_ceiling
  # Click right before UNPLUGGING the AC (bedtime varies 22:00-01:00, user 2026-07-15) -
  # this IS lights-out, whatever the clock says. Stamps the learning baseline, stops the
  # compressor gracefully ahead of the power pull, auto-resets, and DISARMS the master for
  # the night (user 2026-07-17) - arm again when redeploying next day.
  ac_removed_entity: input_boolean.smart_cooling_ac_removed

  default_night_ceiling: 23.0
  min_temp: 16.0          # hardware floor; never drive the room below
  sleep_hours: 8.0
  # Trust the learned feasible floor from the FIRST night (default 2): with n=1 (20.5C,
  # 2026-07-15) still untrusted, the planner spent 2026-07-16 evening asking ~255 min
  # toward an ideal 16.8C the floor demonstrably won't reach, which forced it into the
  # 2-3.5 kr peak slots -- the exact "600W in the expensive hours" waste the cap exists
  # to prevent (user). The -0.3C probe below the learned limit still lets milder nights
  # re-teach a deeper value, so a one-night fluke self-corrects.
  feasible_min_samples: 1
  # Condenser room (bathroom): door kept sealed (user 2026-07-16), so a warm bathroom
  # only costs condenser efficiency (~2-3%/C) - cheaper than deferring to peak prices.
  # bathroom_backleak_c just annotates the plan (soft, cosmetic). bathroom_delta_max_c
  # is the real stop condition: how far the bathroom sits ABOVE OUTDOOR, not an
  # absolute temperature (user 2026-07-19 - validated against 19 days of real data:
  # legitimate operation never exceeded +9.9C above outdoor; the 2026-07-17->18
  # incident, a barely-cracked window, was already past +11.4C within an hour and hit
  # +21.2C at its worst). Enforced regardless of Cool night's arm state (see
  # _condenser_hazard in smart_cooling.py) - a 2026-07-17 disarm was correctly
  # followed 4s later by something OUTSIDE this app re-enabling the compressor, which
  # then ran unmonitored for ~9h since the old guard only lived inside the armed path.
  bathroom_backleak_c: 30.0
  bathroom_delta_max_c: 12.0

  # actuation. Fan sweep 2026-07-15: fan draw is trivial (44 W even at full) and no fan
  # mode prevents the intake stall -- so fan choice is free; auto per user preference
  # 2026-07-16 (nobody in the room while pre-cooling, noise irrelevant).
  # Setpoint 16 since 2026-07-16: the unit always accepted 16 (proven via the Midea app);
  # the old 17 floor was the midea_auto_cloud integration's mapping. Fixed properly via a
  # dedicated device profile keyed ("subtype", 524) in T0xAC.py -- worktree
  # ~/repositories/midea-porta-split, branch porta-split-profile, deployed to the box
  # (re-apply if a HACS update overwrites it; PR-ready for upstream). Lower setpoint =
  # the intake sensor must read 1C colder before the compressor parks = fewer stall-burps.
  cool_setpoint: 16.0
  cool_fan_mode: auto
  cool_power_kw: 0.5      # measured engaged average 2026-07-15 (was 0.6 guess); est-cost only
  # Stall-breaker: idle-with-deficit -> fan_only burp so the intake reads room air,
  # then cooling restarts hard (parks at ~300 W otherwise, cooling nothing).
  # Quiet gate: no burps while either bedside is occupied (the silence->800W roar is
  # what bothers a person in bed; parked crawl accepted until the Remove press).
  stall_fanonly_min: 3
  stall_burp_cooldown_min: 15
  # Occupied quiet cooling (user 2026-07-19: watching TV in bed -> cool, just less
  # noisy): active cooling drops to this fan speed instead of cool_fan_mode while
  # either bedside is occupied. Not measured on this unit (the 2026-07-15 sweep
  # covered low/medium/high/full, not silent) -- tune down to "low" if it proves
  # too weak or behaves oddly.
  cool_fan_quiet_mode: silent
  # Dry-finish (user 2026-07-17): evening holds at-target switch to `dry` mode while the
  # air is damp -- low fan over a cold coil = more water out per kWh, quietly, right
  # before the room is sealed. A drier start delays the night's clammy crossing (the
  # overnight dew-point climb from breathing itself is unavoidable).
  dry_finish_from_hour: 20
  dry_finish_dp_c: 12.0
  dry_finish_max_min: 45
  check_interval_min: 15
  min_cycle_min: 10
  status_entity: sensor.smart_cooling_status
  notify_target: user
  # Deploy watchdog (2026-07-19): armed but the AC stayed unreachable all
  # afternoon because a smart-plug button got pressed alongside the nightly
  # unplug -- "plugged in" wasn't actually powered. One notification after
  # this many minutes armed-but-unreachable; resets the moment it deploys.
  deploy_watchdog_min: 20

  # SAFE ROLLOUT: runs + learns + publishes the plan, but NEVER touches the AC.
  dry_run: false   # live since 2026-07-13 (user: "the automation should take care of it"); master toggle still gates everything

  # --- weather-driven equilibrium estimator (verified Model D) ---
  # Predicts the apartment's daytime peak the sealed bedroom coasts toward, from
  # measured+forecast solar, forecast outdoor peak, a resting baseline, and one day of
  # thermal-mass memory (yesterday's kitchen peak) -- replacing the naive
  # max(kitchen,mid,floor) proxy so a hot sunny day pre-cools deep+early while the live
  # kitchen is still cool, and a cool sunless day barely pre-cools. SHADOW ROLLOUT: with
  # wm_shadow true the weather E is COMPUTED and PUBLISHED every tick (equilibrium_weather /
  # kitchen_max_pred / solar_mean_est / outdoor_max_est on sensor.smart_cooling_status) but
  # the LEGACY proxy still drives actuation -- zero behaviour change. Validate
  # predicted-vs-actual for 1-2 weeks over hot AND cool days, then flip wm_shadow: false.
  # weather_model_enabled is the instant kill-switch back to legacy. Every degradation path
  # (missing solar, failed forecast, unseeded memory, any exception) falls back to legacy,
  # and E is floored at legacy - wm_nowcast_relief so a broken model can't crater it.
  # Coefficients are single-warm-season (Apr-Jul); the 24C vent knee is a conservative
  # hand-picked constant, not a tuned parameter -- re-fit + re-shadow before off-season use.
  weather_model_enabled: true
  wm_shadow: true
  wm_b0: 15.797
  wm_b_solar: 0.0162
  wm_b_vent: 0.198
  wm_vent_knee: 24.0
  wm_b_prev: 0.287
  wm_safety_margin: 0.0     # add-on warm bias on E if shadow shows under-prediction
  wm_nowcast_relief: 1.5    # max degrees the model may predict below the live warmest reading
  wm_clearsky_peak: 700.0   # clear-sky half-sine amplitude (W/m2) for remaining-daylight solar
  wm_cloud_atten: 0.75      # cloud attenuation of the clear-sky estimate
  wm_peak_hour: 15          # before this hour a missing forecast forces legacy (hot-day guard)
  solar_sensor: sensor.gw2000a_solar_radiation
  weather_forecast_entity: weather.forecast_home
  sun_entity: sun.sun
