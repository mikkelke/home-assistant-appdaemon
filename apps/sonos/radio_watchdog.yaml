# /conf/apps/sonos/radio_watchdog.yaml
# One self-resume attempt when a long-playing RADIO stream dies on a group
# coordinator (DR CDN failure 2026-07-08). Notifies every action it takes;
# set enabled: false to switch the behavior off.

RadioWatchdog:
  module: radio_watchdog
  class: RadioWatchdog
  log: sonos_log
  players:
    - media_player.living_room_2
    - media_player.kitchen_2
    - media_player.dining_room_2
    - media_player.bedroom_2
    - media_player.bathroom_2
    - media_player.guest_bathroom_2
    - media_player.kristines_room_2
    - media_player.claudias_room_2
    - media_player.rooftop_2
  min_play_minutes: 10
  cooldown_minutes: 60
  check_delay_seconds: 12
  enabled: true
  notify_target: mikkel
